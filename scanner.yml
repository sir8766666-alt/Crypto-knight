name: SMA-50 Signal Scanner

on:
  schedule:
    # Runs every 5 minutes — GitHub Actions minimum is 5 min
    # Times are UTC. Indian market hours = UTC 03:30–10:00 (NSE)
    # Forex active hours IST = 08:30–01:00 next day
    # We run all day and let the Python script handle session filtering
    - cron: "*/5 * * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4      # kill if yfinance hangs

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py
